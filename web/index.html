<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supertonic 3 — Панель голосового ИИ</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="background-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
    </div>

    <div class="app-container">
        <!-- Левая панель настроек (Glassmorphism) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-sliders-h"></i> Настройки</h2>
            </div>

            <!-- Переключатель вкладок -->
            <div class="mode-tabs">
                <button class="tab-btn active" id="tab-tts">
                    <i class="fa-solid fa-file-audio"></i> Локальный TTS
                </button>
                <button class="tab-btn" id="tab-alisa">
                    <i class="fa-solid fa-phone-volume"></i> Звонок Алисе
                </button>
            </div>
            
            <hr class="separator">

            <!-- Общие настройки голоса -->
            <div class="setting-group">
                <div class="ref-audio-label">
                    <label for="voiceStyleSelect"><i class="fa-solid fa-user-waveform"></i> Голос (Supertonic)</label>
                    <span id="voiceStyleInfo" class="ref-audio-info">Загрузка...</span>
                </div>
                <select id="voiceStyleSelect">
                    <optgroup label="Женские голоса">
                        <option value="assets/voice_styles/F2.json" selected>Алиса (F2 - Рекомендуется)</option>
                        <option value="assets/voice_styles/F1.json">F1 (Дикторский)</option>
                        <option value="assets/voice_styles/F3.json">F3 (Информационный)</option>
                        <option value="assets/voice_styles/F4.json">F4 (Мягкий)</option>
                        <option value="assets/voice_styles/F5.json">F5 (Энергичный)</option>
                    </optgroup>
                    <optgroup label="Мужские голоса">
                        <option value="assets/voice_styles/M1.json">M1 (Стандартный)</option>
                        <option value="assets/voice_styles/M2.json">M2 (Глубокий)</option>
                        <option value="assets/voice_styles/M3.json">M3 (Научный)</option>
                        <option value="assets/voice_styles/M4.json">M4 (Игровой)</option>
                        <option value="assets/voice_styles/M5.json">M5 (Деловой)</option>
                    </optgroup>
                </select>
            </div>

            <div class="setting-group">
                <label for="speed-range">
                    <span><i class="fa-solid fa-gauge-high"></i> Скорость речи:</span>
                    <span id="speed-val">1.05</span>
                </label>
                <input type="range" id="speed-range" min="0.5" max="2.0" step="0.05" value="1.05">
            </div>

            <div class="setting-group">
                <label for="steps-range">
                    <span><i class="fa-solid fa-wand-magic-sparkles"></i> Шаги синтеза:</span>
                    <span id="steps-val">8</span>
                </label>
                <input type="range" id="steps-range" min="1" max="50" step="1" value="8">
            </div>

            <!-- Настройки ИИ Алисы (показываются только во вкладке Алисы) -->
            <div id="alisa-settings" class="alisa-only-settings hidden">
                <hr class="separator">
                
                <div class="setting-group">
                    <label for="brain-select"><i class="fa-solid fa-brain"></i> Модель (Мозг)</label>
                    <select id="brain-select">
                        <option value="vllm" selected>vLLM (Local, OpenAI)</option>
                        <option value="lm-studio">LM Studio (Local, OpenAI)</option>
                        <option value="ollama">Ollama (Local, API)</option>
                        <option value="gemini">Gemini API (Cloud)</option>
                        <option value="mock">Локальная заглушка</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="mode-select"><i class="fa-solid fa-headset"></i> Режим звонка</label>
                    <select id="mode-select">
                        <option value="walkie-talkie">Рация (По кнопке)</option>
                        <option value="real-time" selected>Свободные руки (VAD)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="stt-select"><i class="fa-solid fa-microphone-lines"></i> Распознавание (STT)</label>
                    <select id="stt-select">
                        <option value="faster-whisper" selected>Faster-Whisper (Локально)</option>
                        <option value="browser">Web Speech API (Браузер)</option>
                    </select>
                </div>

                <div class="setting-group" id="api-url-group">
                    <label for="api-url-input"><i class="fa-solid fa-network-wired"></i> URL API Бэкенда</label>
                    <input type="text" id="api-url-input" value="http://127.0.0.1:8001" placeholder="http://127.0.0.1:8001">
                </div>

                <!-- RAG База знаний -->
                <div class="setting-group rag-group">
                    <label for="rag-context-textarea"><i class="fa-solid fa-file-invoice"></i> База знаний (RAG)</label>
                    <div class="rag-drop-zone" id="rag-drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Перетащите файл или кликните</span>
                        <input type="file" id="rag-file-input" accept=".txt,.json,.md,.csv" style="display: none;">
                    </div>
                    <textarea id="rag-context-textarea" placeholder="Информация о вакансии (зарплата, адрес, график, требования)..." rows="4"></textarea>
                    <button type="button" class="btn-save-rag" id="btn-save-rag">
                        <i class="fa-solid fa-floppy-disk"></i> Сохранить базу
                    </button>
                    <div id="rag-status" class="rag-status"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <p>Supertonic TTS & Алиса &bull; v3.0</p>
            </div>
        </aside>

        <!-- Основная область интерфейса -->
        <main class="main-content">
            <!-- Верхняя строка состояния -->
            <header class="app-header">
                <h1>🎤 Supertonic 3</h1>
                <div id="statusBox" class="status-box">
                    <div class="status-text-wrapper">
                        <span id="statusText">ℹ️ <strong>Загрузка моделей...</strong> Подождите...</span>
                    </div>
                    <div id="backendBadge" class="backend-badge">WebAssembly</div>
                </div>
            </header>

            <!-- Контент вкладки 1: Локальный TTS синтез -->
            <section id="panel-tts" class="tab-panel active">
                <div class="tts-container">
                    <div class="section">
                        <label for="langSelect">Язык синтеза:</label>
                        <select id="langSelect">
                            <option value="ru" selected>Russian (ru)</option>
                            <option value="en">English (en)</option>
                            <option value="ko">한국어 (ko)</option>
                            <option value="ja">日本語 (ja)</option>
                            <option value="ar">العربية (ar)</option>
                            <option value="bg">Bulgarian (bg)</option>
                            <option value="cs">Czech (cs)</option>
                            <option value="da">Danish (da)</option>
                            <option value="de">Deutsch (de)</option>
                            <option value="el">Greek (el)</option>
                            <option value="es">Español (es)</option>
                            <option value="et">Estonian (et)</option>
                            <option value="fi">Finnish (fi)</option>
                            <option value="fr">Français (fr)</option>
                            <option value="hi">Hindi (hi)</option>
                            <option value="hr">Croatian (hr)</option>
                            <option value="hu">Hungarian (hu)</option>
                            <option value="id">Indonesian (id)</option>
                            <option value="it">Italian (it)</option>
                            <option value="lt">Lithuanian (lt)</option>
                            <option value="lv">Latvian (lv)</option>
                            <option value="nl">Dutch (nl)</option>
                            <option value="pl">Polish (pl)</option>
                            <option value="pt">Português (pt)</option>
                            <option value="ro">Romanian (ro)</option>
                            <option value="sk">Slovak (sk)</option>
                            <option value="sl">Slovenian (sl)</option>
                            <option value="sv">Swedish (sv)</option>
                            <option value="tr">Turkish (tr)</option>
                            <option value="uk">Ukrainian (uk)</option>
                            <option value="vi">Vietnamese (vi)</option>
                        </select>
                    </div>

                    <div class="section">
                        <label for="text">Текст для озвучивания:</label>
                        <textarea id="text" placeholder="Введите текст для синтеза...">Сегодня утром я гулял по парку. Пение птиц и шелест листьев были настолько приятными, что я остановился на долгое время, чтобы просто послушать.</textarea>
                    </div>

                    <button id="generateBtn" class="generate-btn">
                        <i class="fa-solid fa-play"></i> Синтезировать речь
                    </button>

                    <div id="error" class="error"></div>

                    <!-- Результаты генерации -->
                    <div id="results" class="results">
                        <div class="results-placeholder">
                            <div class="results-placeholder-icon">🎵</div>
                            <p>Сгенерированное аудио появится здесь</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Контент вкладки 2: Интерактивный звонок Алисе -->
            <section id="panel-alisa" class="tab-panel hidden">
                <div class="alisa-container">
                    <!-- Сферический холст-визуализатор волн -->
                    <div class="visualizer-section">
                        <div class="orb-container">
                            <div class="orb-glow"></div>
                            <button class="record-btn" id="record-btn" aria-label="Начать звонок">
                                <i class="fa-solid fa-phone" id="mic-icon"></i>
                            </button>
                            <canvas id="orb-waves" class="orb-waves"></canvas>
                        </div>
                        <div class="hint-text" id="hint-text">Нажмите на трубку, чтобы начать разговор с Алисой</div>
                    </div>

                    <!-- Окно диалога (Транскрипт) -->
                    <div class="chat-section">
                        <div class="chat-container" id="chat-container">
                            <div class="message assistant">
                                <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                                <div class="message-bubble">
                                    Привет! Я готова к живому общению. Поговори со мной!
                                </div>
                            </div>
                        </div>
                        <form class="chat-input-form" id="chat-input-form">
                            <input type="text" id="chat-text-input" placeholder="Или напишите сообщение текстом..." autocomplete="off">
                            <button type="submit" id="send-text-btn" aria-label="Отправить">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Загрузка аудиоэлемента для проигрывания синтеза в Алисе -->
    <audio id="audio-player" style="display: none;"></audio>

    <script type="module" src="/main.js"></script>
</body>
</html>
